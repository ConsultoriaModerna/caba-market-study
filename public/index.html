<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CABA Market Study - Real Estate Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0e1a;
            color: #e2e8f0;
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border-bottom: 1px solid #334155;
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .header-subtitle {
            font-size: 12px;
            color: #94a3b8;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            padding: 8px 16px;
            background: #111827;
            border: 1px solid #334155;
            border-radius: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #94a3b8;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background-color: #10b981;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .tabs-container {
            border-bottom: 1px solid #334155;
            background-color: #0a0e1a;
            padding: 0 32px;
            display: flex;
            gap: 32px;
        }

        .tab-button {
            padding: 16px 0;
            border: none;
            background: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-button:hover {
            color: #cbd5e1;
        }

        .tab-button.active {
            color: #00d4ff;
            border-bottom-color: #00d4ff;
        }

        .main-content {
            padding: 32px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .kpi-card {
            background-color: #111827;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .kpi-value {
            font-size: 28px;
            font-weight: 700;
            color: #00d4ff;
            margin-bottom: 8px;
        }

        .kpi-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Charts Section */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .chart-container {
            background-color: #111827;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
        }

        .chart-title {
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .chart-canvas {
            max-height: 350px;
        }

        /* Table Styles */
        .filters-container {
            background-color: #111827;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-label {
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
        }

        input[type="text"],
        input[type="number"],
        select {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }

        input[type="range"] {
            width: 100%;
        }

        select:focus,
        input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .table-wrapper {
            background-color: #111827;
            border: 1px solid #334155;
            border-radius: 8px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            background-color: #0f172a;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: #94a3b8;
            border-bottom: 1px solid #334155;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            cursor: pointer;
            user-select: none;
        }

        th:hover {
            color: #cbd5e1;
            background-color: #1e293b;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid #1e293b;
        }

        tbody tr:hover {
            background-color: #1e293b;
        }

        .neighborhood-cell {
            color: #00d4ff;
            font-weight: 500;
        }

        .title-cell {
            color: #e2e8f0;
            text-decoration: none;
            cursor: pointer;
        }

        .title-cell:hover {
            color: #00d4ff;
            text-decoration: underline;
        }

        .price-cell {
            font-weight: 600;
            color: #10b981;
        }

        .price-cell.yellow { color: #f59e0b; }
        .price-cell.orange { color: #f97316; }
        .price-cell.red { color: #ef4444; }

        .source-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .source-badge.zp {
            background-color: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .source-badge.ml {
            background-color: rgba(168, 85, 247, 0.2);
            color: #d8b4fe;
        }

        .tags-cell {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .tag {
            display: inline-block;
            padding: 3px 8px;
            background-color: #334155;
            color: #cbd5e1;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 500;
        }

        .tag.special {
            background-color: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }

        .warning-icon {
            display: inline-block;
            margin-left: 4px;
            color: #ef4444;
            font-weight: bold;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 24px;
            align-items: center;
        }

        .pagination button {
            padding: 8px 12px;
            background-color: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            background-color: #334155;
            border-color: #00d4ff;
            color: #00d4ff;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination-info {
            color: #94a3b8;
            font-size: 13px;
        }

        /* Search Tab */
        .search-container {
            background-color: #111827;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .search-input-group {
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
        }

        .quick-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .keyword-pill {
            padding: 6px 12px;
            background-color: #334155;
            color: #cbd5e1;
            border: 1px solid #475569;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .keyword-pill:hover {
            background-color: #475569;
            border-color: #00d4ff;
            color: #00d4ff;
        }

        .search-filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .search-results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .result-card {
            background-color: #111827;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 16px;
            transition: all 0.2s;
        }

        .result-card:hover {
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .result-title {
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .result-meta {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }

        .result-price {
            font-weight: 700;
            color: #10b981;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .result-description {
            font-size: 12px;
            color: #cbd5e1;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .highlight {
            background-color: rgba(0, 212, 255, 0.3);
            color: #00d4ff;
            font-weight: 600;
        }

        .result-link {
            display: inline-block;
            padding: 6px 12px;
            background-color: #00d4ff;
            color: #0a0e1a;
            border-radius: 4px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .result-link:hover {
            background-color: #00b8d4;
        }

        .stats-banner {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #94a3b8;
        }

        /* Opportunities Tab */
        .opportunity-card {
            background-color: #111827;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.2s;
        }

        .opportunity-card:hover {
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .opportunity-badge {
            display: inline-block;
            padding: 4px 12px;
            background-color: #10b981;
            color: white;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .opportunity-badge.refurbish {
            background-color: #f59e0b;
        }

        .opportunity-badge.land {
            background-color: #06b6d4;
        }

        .opportunity-title {
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .opportunity-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 12px;
            font-size: 12px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .detail-label {
            color: #94a3b8;
            text-transform: uppercase;
            font-weight: 500;
            font-size: 10px;
        }

        .detail-value {
            color: #e2e8f0;
            font-weight: 600;
        }

        .discount-badge {
            font-size: 18px;
            color: #10b981;
            font-weight: 700;
        }

        .opportunity-link {
            display: inline-block;
            padding: 6px 12px;
            background-color: #00d4ff;
            color: #0a0e1a;
            border-radius: 4px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .opportunity-link:hover {
            background-color: #00b8d4;
        }

        /* Loading Spinner */
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #334155;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        .loading-text {
            color: #94a3b8;
            font-size: 14px;
        }

        /* Error Message */
        .error-message {
            background-color: #7f1d1d;
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 24px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }

            .filters-container {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px 12px;
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 16px;
                padding: 16px;
            }

            .tabs-container {
                padding: 0 16px;
                gap: 16px;
                overflow-x: auto;
            }

            .main-content {
                padding: 16px;
            }

            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .search-results {
                grid-template-columns: 1fr;
            }

            .tags-cell {
                display: none;
            }

            th:nth-child(n+5),
            td:nth-child(n+5) {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>CABA Market Study</h1>
            <div class="header-subtitle">Real Estate Market Dashboard</div>
        </div>
        <div class="connection-status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Conectando...</span>
        </div>
    </div>

    <div class="tabs-container">
        <button class="tab-button active" data-tab="panorama">Panorama</button>
        <button class="tab-button" data-tab="propiedades">Propiedades</button>
        <button class="tab-button" data-tab="searcher">Super Searcher</button>
        <button class="tab-button" data-tab="oportunidades">Oportunidades</button>
    </div>

    <div class="main-content">
        <!-- Tab 1: Panorama -->
        <div id="panorama" class="tab-content active">
            <div id="panoramaContent">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Cargando datos de mercado...</div>
                </div>
            </div>
        </div>

        <!-- Tab 2: Propiedades -->
        <div id="propiedades" class="tab-content">
            <div id="propiedadesContent">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Cargando propiedades...</div>
                </div>
            </div>
        </div>

        <!-- Tab 3: Super Searcher -->
        <div id="searcher" class="tab-content">
            <div id="searcherContent">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Preparando búsqueda...</div>
                </div>
            </div>
        </div>

        <!-- Tab 4: Oportunidades -->
        <div id="oportunidades" class="tab-content">
            <div id="oportunidadesContent">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Analizando oportunidades...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://ysynltkotzizayjtoujf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzeW5sdGtvdHppemF5anRvdWpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MzM1MjksImV4cCI6MjA4MTIwOTUyOX0.-rSFZIILSIwPWIRW-frMm27_wRsIOK79Txz5alE6QUE';

        const DEFAULT_HEADERS = {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
        };

        // ============================================
        // STATE
        // ============================================
        let allProperties = [];
        let marketStats = [];
        let currentTab = 'panorama';
        let currentPage = 1;
        const itemsPerPage = 50;

        // Filter state
        let filterPriceMin = 0;
        let filterPriceMax = 5000000;
        let filterNeighborhood = '';
        let filterSource = '';
        let filterMinArea = 0;

        // Chart instances
        let neighborhoodsChart = null;
        let priceChart = null;
        let segmentChart = null;

        // ============================================
        // TAB SWITCHING
        // ============================================
        document.querySelectorAll('.tab-button').forEach(button => {
            button.addEventListener('click', (e) => {
                const tabName = e.target.dataset.tab;
                switchTab(tabName);
            });
        });

        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');

            currentTab = tabName;

            // Load content if not already loaded
            if (tabName === 'panorama') initPanorama();
            else if (tabName === 'propiedades') initPropiedades();
            else if (tabName === 'searcher') initSearcher();
            else if (tabName === 'oportunidades') initOportunidades();
        }

        // ============================================
        // CONNECTION STATUS
        // ============================================
        async function updateConnectionStatus() {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/properties?select=count()&limit=1`, {
                    headers: DEFAULT_HEADERS
                });

                if (response.ok) {
                    statusDot.classList.add('connected');
                    statusText.textContent = 'Conectado en vivo';
                } else {
                    statusDot.classList.remove('connected');
                    statusText.textContent = 'Desconectado';
                }
            } catch (error) {
                statusDot.classList.remove('connected');
                statusText.textContent = 'Error de conexión';
            }
        }

        updateConnectionStatus();

        // ============================================
        // FETCH FUNCTIONS
        // ============================================
        async function fetchProperties() {
            if (allProperties.length > 0) return allProperties;

            try {
                const params = new URLSearchParams({
                    'select': '*',
                    'or': '(property_type.is.null,property_type.neq.duplicate_ml)',
                    'currency': 'eq.USD',
                    'price': 'gte.10000',
                    'order': 'price.asc',
                    'limit': '5000'
                });

                const response = await fetch(`${SUPABASE_URL}/rest/v1/properties?${params}`, {
                    headers: DEFAULT_HEADERS
                });

                if (!response.ok) throw new Error('Failed to fetch properties');
                allProperties = await response.json();
                return allProperties;
            } catch (error) {
                console.error('Error fetching properties:', error);
                return [];
            }
        }

        async function fetchMarketStats() {
            if (marketStats.length > 0) return marketStats;

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/v_market_stats?select=*`, {
                    headers: DEFAULT_HEADERS
                });

                if (!response.ok) throw new Error('Failed to fetch market stats');
                marketStats = await response.json();
                return marketStats;
            } catch (error) {
                console.error('Error fetching market stats:', error);
                return [];
            }
        }

        async function searchProperties(searchTerms, minPrice, maxPrice, limit = 50) {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/search_properties`, {
                    method: 'POST',
                    headers: DEFAULT_HEADERS,
                    body: JSON.stringify({
                        search_terms: searchTerms,
                        min_price: minPrice,
                        max_price: maxPrice,
                        target_currency: 'USD',
                        target_neighborhood: null,
                        result_limit: limit
                    })
                });

                if (!response.ok) throw new Error('Search failed');
                return await response.json();
            } catch (error) {
                console.error('Error searching properties:', error);
                return [];
            }
        }

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function extractKeywords(title) {
            const keywordPatterns = {
                'reciclada': /reciclad/i,
                'a estrenar': /a estrenar|estrena/i,
                'refaccionar': /refacciona/i,
                'luminosa': /luminosa|luminoso/i,
                'cochera': /cochera/i,
                'pileta': /pileta/i,
                'jardín': /jardín|jardin/i,
                'terraza': /terraza/i,
                'PH': /\bph\b/i,
                'lote propio': /lote propio/i,
                'parrilla': /parrilla/i,
                'balcón': /balcón|balcon/i,
                'dependencia': /dependencia/i,
                'quincho': /quincho/i,
                'solarium': /solarium/i,
                'losa radiante': /losa radiante/i,
                'piso radiante': /piso radiante/i,
                'vista': /vista/i,
                'silencioso': /silencioso/i
            };

            const keywords = [];
            for (const [key, pattern] of Object.entries(keywordPatterns)) {
                if (pattern.test(title)) keywords.push(key);
            }
            return keywords;
        }

        function hasWarningConstraint(address) {
            if (!address) return false;
            const patterns = /vías|ferrocarril|autopista|ruta/i;
            return patterns.test(address);
        }

        function getPriceColorClass(pricePerM2) {
            if (pricePerM2 < 800) return 'green';
            if (pricePerM2 < 1200) return 'yellow';
            if (pricePerM2 < 1800) return 'orange';
            return 'red';
        }

        function getPriceColor(pricePerM2) {
            if (pricePerM2 < 800) return '#10b981';
            if (pricePerM2 < 1200) return '#f59e0b';
            if (pricePerM2 < 1800) return '#f97316';
            return '#ef4444';
        }

        function formatPrice(price) {
            return new Intl.NumberFormat('es-AR', {
                style: 'currency',
                currency: 'USD',
                maximumFractionDigits: 0
            }).format(price);
        }

        function highlightKeywords(text, keywords) {
            let result = text;
            keywords.forEach(keyword => {
                const regex = new RegExp(`(${keyword})`, 'gi');
                result = result.replace(regex, '<span class="highlight">$1</span>');
            });
            return result;
        }

        async function createCharts(segment100k200k, allProperties) {
            // Chart 1: Top neighborhoods by count

                }

            const sortedNeighborhoods = Object.entries(neighborhoodCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 15);

            const ctx1 = document.getElementById('neighborhoodsChart').getContext('2d');
            neighborhoodsChart = new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: sortedNeighborhoods.map(n => n[0]),
                    datasets: [{
                        label: 'Cantidad',
                        data: sortedNeighborhoods.map(n => n[1]),
                        backgroundColor: '#00d4ff',
                        borderColor: '#0099cc',
                        borderWidth: 1
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: {
                            ticks: { color: '#94a3b8' },
                            grid: { color: '#334155' }
                        },
                        y: {
                            ticks: { color: '#94a3b8' },
                            grid: { display: false }
                        }
                    }
                }
            });

            // Chart 2: Median price per neighborhood
            const neighborhoodMedians = {};
            segment100k200k.forEach(p => {
                if (p.neighborhood && p.total_area && Number(p.total_area) > 0) {
                    const pricePerM2 = Number(p.price) / Number(p.total_area);
                    if (!neighborhoodMedians[p.neighborhood]) {
                        neighborhoodMedians[p.neighborhood] = [];
                    }
                    neighborhoodMedians[p.neighborhood].push(pricePerM2);
                }
            });

            const mediansByNeighborhood = Object.entries(neighborhoodMedians)
                .map(([neighborhood, prices]) => {
                    const sorted = prices.sort((a, b) => a - b);
                    const median = sorted[Math.floor(sorted.length / 2)];
                    return [neighborhood, median];
                })
                .sort((a, b) => a[1] - b[1])
                .slice(0, 15);

            const ctx2 = document.getElementById('priceChart').getContext('2d');
            priceChart = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: mediansByNeighborhood.map(n => n[0]),
                    datasets: [{

                '100k-200k': allProperties.filter(p => Number(p.price) >= 100000 && Number(p.price) < 200000).length,
                '200k-500k': allProperties.filter(p => Number(p.price) >= 200000 && Number(p.price) < 500000).length,
                '500k-1M': allProperties.filter(p => Number(p.price) >= 500000 && Number(p.price) < 1000000).length,
                '1M+': allProperties.filter(p => Number(p.price) >= 1000000).length
            };

            const ctx3 = document.getElementById('segmentChart').getContext('2d');
            segmentChart = new Chart(ctx3, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(segments),
                    datasets: [{
                        data: Object.values(segments),
                        backgroundColor: [
                            '#06b6d4',

                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {

        function renderPropertiesTable(properties) {
            let filtered = properties.filter(p => {
                if (Number(p.price) < filterPriceMin || Number(p.price) > filterPriceMax) return false;
                if (filterNeighborhood && p.neighborhood !== filterNeighborhood) return false;
                if (filterSource && p.source !== filterSource) return false;
                if (p.total_area && Number(p.total_area) < filterMinArea) return false;
                return true;
            });

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const paged = filtered.slice(start, end);

            const tbody = document.getElementById('propertiesTableBody');
            tbody.innerHTML = paged.map(p => {
                const price = Number(p.price);
                const totalArea = Number(p.total_area);
                const pricePerM2 = (totalArea && totalArea > 0) ? price / totalArea : 0;
                const keywords = extractKeywords(p.title || '');
                const colorClass = getPriceColorClass(pricePerM2);
                const warning = hasWarningConstraint(p.address_text);
                
                // Extract bedrooms from title if null
                let bedrooms = p.bedrooms;
                if (!bedrooms) {
                    const match = (p.title || '').match(/(\d+)\s*amb/i);
                    if (match) bedrooms = match[1];
                }

                return `
                    <tr>
                        <td class="neighborhood-cell">${p.neighborhood || 'N/A'}</td>
                        <td><a href="${p.permalink}" target="_blank" class="title-cell">${p.title || 'Sin título'}</a></td>
                        <td class="price-cell">${formatPrice(price)}</td>
                        <td class="price-cell ${colorClass}">$${Math.round(pricePerM2).toLocaleString('es-AR')}</td>
                        <td>${totalArea ? Math.round(totalArea).toLocaleString('es-AR') : 'N/A'} m²</td>
                        <td>${bedrooms || '-'}</td>
                        <td>${p.bathrooms || '-'}</td>
                        <td><span class="source-badge ${p.source.toLowerCase()}">${p.source}</span></td>
                        <td>
                            <div class="tags-cell">
                                ${keywords.map(k => `<span class="tag special">${k}</span>`).join('')}
                                ${warning ? '<span class="warning-icon" title="Cerca de vías/ferrocarril/autopista">⚠️</span>' : ''}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');

            // Pagination
            const totalPages = Math.ceil(filtered.length / itemsPerPage);
            const paginationControls = document.getElementById('paginationControls');
            paginationControls.innerHTML = `
                <button onclick="previousPage()" ${currentPage === 1 ? 'disabled' : ''}>← Anterior</button>
                <span class="pagination-info">Página ${currentPage} de ${totalPages} (${filtered.length} propiedades)</span>
                <button onclick="nextPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>Siguiente →</button>
            `;
        }

        function sortTable(column) {
            // Simple sorting placeholder - in production would add full sorting logic
            console.log('Sort by:', column);

        function previousPage() {
            if (currentPage > 1) {

                renderPropertiesTable(allProperties);
            }
        }

        function nextPage(maxPages) {
            if (currentPage < maxPages) {
                currentPage++;
                renderPropertiesTable(allProperties);
            }
        }

        // ============================================
        // TAB 4: OPORTUNIDADES
        // ============================================
        async function initOportunidades() {
            const container = document.getElementById('oportunidadesContent');

            try {
                const [properties, stats] = await Promise.all([
                    fetchProperties(),
                    fetchMarketStats()
                ]);

                if (properties.length === 0) {
                    container.innerHTML = '<div class="error-message">Error cargando datos</div>';
                    return;
                }

                // Create neighborhood median map
                const neighborhoodMedians = {};
                stats.forEach(s => {
                    if (s.neighborhood && s.median_price_per_sqm) {
                        neighborhoodMedians[s.neighborhood] = s.median_price_per_sqm;
                    }
                });

                // Find opportunities
                const opportunities = [];

                properties.forEach(p => {
                    if (!p.neighborhood || !p.total_area || Number(p.total_area) === 0) return;

                    const pricePerM2 = Number(p.price) / Number(p.total_area);
                    const neighborhoodMedian = neighborhoodMedians[p.neighborhood];

                    // Price opportunity: 20% below median
                    if (neighborhoodMedian && pricePerM2 < neighborhoodMedian * 0.8) {
                        const gap = ((neighborhoodMedian - pricePerM2) / neighborhoodMedian * 100).toFixed(1);
                        opportunities.push({
                            type: 'price',
                            property: p,
                            gap,
                            neighborhoodMedian,
                            pricePerM2,
                            reason: 'Oportunidad por precio'
                        });
                    }

                    // Refurbish opportunity
                    const keywords = extractKeywords(p.title || '');
                    if (keywords.some(k => ['reciclada', 'refaccionar', 'a reciclar'].includes(k))) {
                        opportunities.push({
                            type: 'refurbish',
                            property: p,
                            pricePerM2,
                            neighborhoodMedian,
                            reason: 'Oportunidad de refacción'
                        });
                    }

                    // Land opportunity
                    if (keywords.includes('lote propio')) {
                        opportunities.push({
                            type: 'land',
                            property: p,
                            pricePerM2,
                            reason: 'Lote propio'
                        });
                    }
                });

                // Sort by gap
                opportunities.sort((a, b) => (b.gap || 0) - (a.gap || 0));

                if (opportunities.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💡</div><div>No se encontraron oportunidades en este momento</div></div>';
                    return;
                }

                const html = opportunities.map(opp => {
                    const badgeClass = opp.type === 'refurbish' ? 'refurbish' : opp.type === 'land' ? 'land' : '';
                    const badgeText = opp.type === 'refurbish' ? 'Refacción' : opp.type === 'land' ? 'Lote Propio' : 'Precio';

                    return `
                        <div class="opportunity-card">
                            <div class="opportunity-badge ${badgeClass}">${badgeText}</div>
                            <div class="opportunity-title">${opp.property.title || 'Sin título'}</div>
                            <div class="opportunity-details">
                                <div class="detail-item">
                                    <div class="detail-label">Barrio</div>
                                    <div class="detail-value">${opp.property.neighborhood}</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">Precio</div>
                                    <div class="detail-value">${formatPrice(opp.property.price)}</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">USD/m²</div>
                                    <div class="detail-value">$${Math.round(opp.pricePerM2).toLocaleString('es-AR')}</div>
                                </div>
                                ${opp.neighborhoodMedian ? `
                                    <div class="detail-item">
                                        <div class="detail-label">Mediana Barrio</div>
                                        <div class="detail-value">$${Math.round(opp.neighborhoodMedian).toLocaleString('es-AR')}</div>
                                    </div>
                                    <div class="detail-item">
                                        <div class="detail-label">Descuento</div>
                                        <div class="detail-value discount-badge">${opp.gap}%</div>
                                    </div>
                                ` : ''}
                                <div class="detail-item">
                                    <div class="detail-label">Superficie</div>
                                    <div class="detail-value">${Math.round(opp.property.total_area)} m²</div>
                                </div>
                            </div>
                            <div style="color: #cbd5e1; font-size: 13px; margin-bottom: 12px;">
                                <strong>${opp.reason}</strong>
                            </div>
                            <a href="${opp.property.permalink}" target="_blank" class="opportunity-link">Ver Propiedad →</a>
                        </div>
                    `;
                }).join('');

                container.innerHTML = html;
            } catch (error) {
                console.error('Error in initOportunidades:', error);
                container.innerHTML = '<div class="error-message">Error cargando oportunidades</div>';
            }
        }

        // ============================================
        // INITIAL LOAD
        // ============================================
        window.addEventListener('DOMContentLoaded', () => {
            initPanorama();
        });
    </script>
</body>
</html>
