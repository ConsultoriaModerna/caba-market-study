<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CABA Market Study - Real Estate Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0e1a;
            color: #e2e8f0;
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border-bottom: 1px solid #334155;
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .header-subtitle {
            font-size: 12px;
            color: #94a3b8;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            padding: 8px 16px;
            background: #111827;
            border: 1px solid #334155;
            border-radius: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #94a3b8;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background-color: #10b981;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .tabs-container {
            border-bottom: 1px solid #334155;
            background-color: #0a0e1a;
            padding: 0 32px;
            display: flex;
            gap: 32px;
            overflow-x: auto;
        }

        .tab-button {
            padding: 16px 0;
            border: none;
            background: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            position: relative;
            white-space: nowrap;
        }

        .tab-button:hover {
            color: #cbd5e1;
        }

        .tab-button.active {
            color: #00d4ff;
            border-bottom-color: #00d4ff;
        }

        .main-content {
            padding: 32px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .kpi-card {
            background-color: #111827;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .kpi-value {
            font-size: 28px;
            font-weight: 700;
            color: #00d4ff;
            margin-bottom: 8px;
        }

        .kpi-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Charts Section */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .chart-container {
            background-color: #111827;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
        }

        .chart-title {
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .chart-canvas {
            max-height: 350px;
        }

        /* Table Styles */
        .filters-container {
            background-color: #111827;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-label {
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
        }

        input[type="text"],
        input[type="number"],
        select {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }

        input[type="range"] {
            width: 100%;
        }

        select:focus,
        input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .table-wrapper {
            background-color: #111827;
            border: 1px solid #334155;
            border-radius: 8px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            background-color: #0f172a;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: #94a3b8;
            border-bottom: 1px solid #334155;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            cursor: pointer;
            user-select: none;
        }

        th:hover {
            color: #cbd5e1;
            background-color: #1e293b;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid #1e293b;
        }

        tbody tr:hover {
            background-color: #1e293b;
        }

        .neighborhood-cell {
            color: #00d4ff;
            font-weight: 500;
        }

        .title-cell {
            color: #e2e8f0;
            text-decoration: none;
            cursor: pointer;
        }

        .title-cell:hover {
            color: #00d4ff;
            text-decoration: underline;
        }

        .price-cell {
            font-weight: 600;
            color: #10b981;
        }

        .price-cell.yellow { color: #f59e0b; }
        .price-cell.orange { color: #f97316; }
        .price-cell.red { color: #ef4444; }

        .source-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .source-badge.zp {
            background-color: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .source-badge.ml {
            background-color: rgba(168, 85, 247, 0.2);
            color: #d8b4fe;
        }

        .tags-cell {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .tag {
            display: inline-block;
            padding: 3px 8px;
            background-color: #334155;
            color: #cbd5e1;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 500;
        }

        .tag.special {
            background-color: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }

        .warning-icon {
            display: inline-block;
            margin-left: 4px;
            color: #ef4444;
            font-weight: bold;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 24px;
            align-items: center;
        }

        .pagination button {
            padding: 8px 12px;
            background-color: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            background-color: #334155;
            border-color: #00d4ff;
            color: #00d4ff;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination-info {
            color: #94a3b8;
            font-size: 13px;
        }

        /* Search Tab */
        .search-container {
            background-color: #111827;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .search-input-group {
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
        }

        .quick-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .keyword-pill {
            padding: 6px 12px;
            background-color: #334155;
            color: #cbd5e1;
            border: 1px solid #475569;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .keyword-pill:hover {
            background-color: #475569;
            border-color: #00d4ff;
            color: #00d4ff;
        }

        .search-filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .search-results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .result-card {
            background-color: #111827;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 16px;
            transition: all 0.2s;
        }

        .result-card:hover {
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .result-title {
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .result-meta {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }

        .result-price {
            font-weight: 700;
            color: #10b981;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .result-description {
            font-size: 12px;
            color: #cbd5e1;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .highlight {
            background-color: rgba(0, 212, 255, 0.3);
            color: #00d4ff;
            font-weight: 600;
        }

        .result-link {
            display: inline-block;
            padding: 6px 12px;
            background-color: #00d4ff;
            color: #0a0e1a;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            font-size: 12px;
        }

        .result-link:hover {
            background-color: #0099cc;
        }

        /* Opportunities */
        .opportunities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .opportunity-card {
            background-color: #111827;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 16px;
            position: relative;
            transition: all 0.2s;
        }

        .opportunity-card:hover {
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .opportunity-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 12px;
            background-color: #334155;
            color: #cbd5e1;
        }

        .opportunity-badge.refurbish {
            background-color: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .opportunity-badge.land {
            background-color: rgba(168, 85, 247, 0.2);
            color: #a855f7;
        }

        .opportunity-title {
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .opportunity-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .detail-item {
            padding: 8px;
            background-color: #0f172a;
            border-radius: 4px;
        }

        .detail-label {
            font-size: 10px;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .detail-value {
            font-size: 13px;
            font-weight: 600;
            color: #00d4ff;
        }

        .discount-badge {
            background-color: rgba(16, 185, 129, 0.2);
            color: #10b981 !important;
        }

        .opportunity-link {
            display: inline-block;
            padding: 6px 12px;
            background-color: #00d4ff;
            color: #0a0e1a;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            font-size: 12px;
        }

        .opportunity-link:hover {
            background-color: #0099cc;
        }

        /* Loading & Empty States */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 16px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #334155;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #94a3b8;
            font-size: 14px;
        }

        .error-message {
            padding: 40px;
            background-color: #111827;
            border: 1px solid #ef4444;
            border-radius: 8px;
            color: #ef4444;
            text-align: center;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 12px;
            color: #94a3b8;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .stats-banner {
            background-color: #111827;
            border-left: 4px solid #00d4ff;
            padding: 12px 16px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #cbd5e1;
        }

        /* Map Tab Styles */
        #mapContainer {
            width: 100%;
            height: 600px;
            border-radius: 8px;
            z-index: 1;
        }

        .leaflet-control-layers {
            background-color: #111827 !important;
            border: 1px solid #334155 !important;
        }

        .leaflet-control-layers-toggle {
            background-color: #1e293b !important;
        }

        .leaflet-popup-content {
            background-color: #111827 !important;
            color: #e2e8f0 !important;
            font-size: 12px;
        }

        .leaflet-popup-content-wrapper {
            background-color: #111827;
            border: 1px solid #334155;
        }

        .leaflet-popup-tip {
            background-color: #111827;
        }

        .leaflet-control-attribution {
            background-color: rgba(17, 24, 39, 0.8) !important;
            color: #94a3b8 !important;
        }

        .map-legend {
            background-color: #111827;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 12px;
            color: #cbd5e1;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        /* Renovation Tab Styles */
        .investment-calculator {
            background-color: #111827;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .calculator-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .calculator-input {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .calculator-label {
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .slider-value {
            font-size: 16px;
            font-weight: 700;
            color: #00d4ff;
        }

        .calc-button {
            padding: 10px 20px;
            background-color: #00d4ff;
            color: #0a0e1a;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .calc-button:hover {
            background-color: #0099cc;
        }

        .calc-results {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }

        .result-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .result-label {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            font-weight: 600;
        }

        .result-value {
            font-size: 18px;
            font-weight: 700;
            color: #00d4ff;
        }

        .viability-badge {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .viability-go {
            background-color: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .viability-caution {
            background-color: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .viability-stop {
            background-color: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 12px;
            }

            .tabs-container {
                padding: 0 16px;
                gap: 16px;
            }

            .main-content {
                padding: 16px;
            }

            .kpi-grid {
                grid-template-columns: 1fr;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .charts-grid .chart-container[style*="grid-column"] {
                grid-column: auto !important;
            }

            .filters-container {
                grid-template-columns: 1fr;
            }

            .search-results {
                grid-template-columns: 1fr;
            }

            .tags-cell {
                display: none;
            }

            th:nth-child(n+5),
            td:nth-child(n+5) {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>CABA Market Study</h1>
            <div class="header-subtitle">Real Estate Market Dashboard</div>
        </div>
        <div class="connection-status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Conectando...</span>
        </div>
    </div>

    <div class="tabs-container">
        <button class="tab-button active" data-tab="panorama">Panorama</button>
        <button class="tab-button" data-tab="propiedades">Propiedades</button>
        <button class="tab-button" data-tab="searcher">Super Searcher</button>
        <button class="tab-button" data-tab="oportunidades">Oportunidades</button>
        <button class="tab-button" data-tab="mapa">Mapa</button>
        <button class="tab-button" data-tab="renovacion">Renovación</button>
    </div>

    <div class="main-content">
        <!-- Tab 1: Panorama -->
        <div id="panorama" class="tab-content active">
            <div id="panoramaContent">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Cargando datos de mercado...</div>
                </div>
            </div>
        </div>

        <!-- Tab 2: Propiedades -->
        <div id="propiedades" class="tab-content">
            <div id="propiedadesContent">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Cargando propiedades...</div>
                </div>
            </div>
        </div>

        <!-- Tab 3: Super Searcher -->
        <div id="searcher" class="tab-content">
            <div id="searcherContent">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Preparando búsqueda...</div>
                </div>
            </div>
        </div>

        <!-- Tab 4: Oportunidades -->
        <div id="oportunidades" class="tab-content">
            <div id="oportunidadesContent">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Analizando oportunidades...</div>
                </div>
            </div>
        </div>

        <!-- Tab 5: Mapa -->
        <div id="mapa" class="tab-content">
            <div id="mapaContent">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Cargando mapa interactivo...</div>
                </div>
            </div>
        </div>

        <!-- Tab 6: Renovación -->
        <div id="renovacion" class="tab-content">
            <div id="renovacionContent">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Cargando análisis de renovación...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://ysynltkotzizayjtoujf.supabase.co';

        function extractKeywords(title) {
            const keywordPatterns = {
                'reciclada': /reciclad/i,
                'a estrenar': /a estrenar|estrena/i,
                'refaccionar': /refacciona/i,
                'luminosa': /luminosa|luminoso/i,
                'cochera': /cochera/i,
                'pileta': /pileta/i,
                'jardín': /jardín|jardin/i,
                'terraza': /terraza/i,
                'PH': /\bph\b/i,
                'lote propio': /lote propio/i,
                'parrilla': /parrilla/i,
                'balcón': /balcón|balcon/i,
                'dependencia': /dependencia/i,
                'quincho': /quincho/i,
                'solarium': /solarium/i,
                'losa radiante': /losa radiante/i,
                'piso radiante': /piso radiante/i,
                'vista': /vista/i,
                'silencioso': /silencioso/i
            };

            const keywords = [];
            for (const [key, pattern] of Object.entries(keywordPatterns)) {
                if (pattern.test(title)) keywords.push(key);
            }
            return keywords;
        }

        function hasWarningConstraint(address) {
            if (!address) return false;
            const patterns = /vías|ferrocarril|autopista|ruta/i;
            return patterns.test(address);
        }

        function getPriceColorClass(pricePerM2) {
            if (pricePerM2 < 800) return 'green';
            if (pricePerM2 < 1200) return 'yellow';
            if (pricePerM2 < 1800) return 'orange';
            return 'red';
        }

        function getPriceColor(pricePerM2) {
            if (pricePerM2 < 800) return '#10b981';
            if (pricePerM2 < 1200) return '#f59e0b';
            if (pricePerM2 < 1800) return '#f97316';
            return '#ef4444';
        }

        function formatPrice(price) {
            return new Intl.NumberFormat('es-AR', {
                style: 'currency',
                currency: 'USD',
                maximumFractionDigits: 0
            }).format(price);
        }

        function highlightKeywords(text, keywords) {
            let result = text;
            keywords.forEach(keyword => {
                const regex = new RegExp(`(${keyword})`, 'gi');
                result = result.replace(regex, '<span class="highlight">$1</span>');
            });
            return result;
        }

        function renderPropertiesTable(properties) {
            let filtered = properties.filter(p => {
                if (p.price < filterPriceMin || p.price > filterPriceMax) return false;
                if (filterNeighborhood && p.neighborhood !== filterNeighborhood) return false;
                if (filterSource && p.source !== filterSource) return false;
                if (p.covered_area && p.covered_area < filterMinArea) return false;
                return true;
            });

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const paged = filtered.slice(start, end);

            const tbody = document.getElementById('propertiesTableBody');
            tbody.innerHTML = paged.map(p => {
                const price = Number(p.price);
                const totalArea = Number(p.total_area);
                const pricePerM2 = (totalArea && totalArea > 0) ? price / totalArea : 0;
                const keywords = extractKeywords(p.title || '');
                const colorClass = getPriceColorClass(pricePerM2);
                const warning = hasWarningConstraint(p.address_text);
                
                // Extract bedrooms from title if null
                let bedrooms = p.bedrooms;
                if (!bedrooms) {
                    const match = (p.title || '').match(/(\d+)\s*amb/i);
                    if (match) bedrooms = match[1];
                }

                return `
                    <tr>
                        <td class="neighborhood-cell">${p.neighborhood || 'N/A'}</td>
                        <td><a href="${p.permalink}" target="_blank" class="title-cell">${p.title || 'Sin título'}</a></td>
                        <td class="price-cell">${formatPrice(price)}</td>
                        <td class="price-cell ${colorClass}">$${Math.round(pricePerM2).toLocaleString('es-AR')}</td>
                        <td>${totalArea ? Math.round(totalArea).toLocaleString('es-AR') : 'N/A'} m²</td>
                        <td>${bedrooms || '-'}</td>
                        <td>${p.bathrooms || '-'}</td>
                        <td><span class="source-badge ${p.source.toLowerCase()}">${p.source}</span></td>
                        <td>
                            <div class="tags-cell">
                                ${keywords.map(k => `<span class="tag special">${k}</span>`).join('')}
                                ${warning ? '<span class="warning-icon" title="Cerca de vías/ferrocarril/autopista">⚠️</span>' : ''}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');

            // Pagination
            const totalPages = Math.ceil(filtered.length / itemsPerPage);
            const paginationControls = document.getElementById('paginationControls');
            paginationControls.innerHTML = `
                <button onclick="previousPage()" ${currentPage === 1 ? 'disabled' : ''}>← Anterior</button>
                <span class="pagination-info">Página ${currentPage} de ${totalPages} (${filtered.length} propiedades)</span>
                <button onclick="nextPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>Siguiente →</button>
            `;
        }

        function addKeyword(keyword) {
            const input = document.getElementById('searchInput');
            const current = input.value.trim();
            if (current) {
                input.value = current + ' ' + keyword;
            } else {
                input.value = keyword;
            }

        async function executeSearch() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            const priceMin = parseInt(document.getElementById('searchPriceMin').value) || 0;
            const priceMax = parseInt(document.getElementById('searchPriceMax').value) || 5000000;
            const limit = parseInt(document.getElementById('searchLimit').value) || 50;

            if (!searchTerm) {
                alert('Por favor ingrese términos de búsqueda');
                return;
            }

            const resultsDiv = document.getElementById('searchResults');
            resultsDiv.innerHTML = '<div class="loading-container"><div class="loading-spinner"></div><div class="loading-text">Buscando...</div></div>';

            try {
                const results = await searchProperties(searchTerm, priceMin, priceMax, limit);

                if (results.length === 0) {
                    resultsDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><div>No se encontraron propiedades con estos criterios</div></div>';
                    return;
                }

                const keywords = searchTerm.toLowerCase().split(/\s+/);
                resultsDiv.innerHTML = results.map(r => {

                    const highlightedDesc = highlightKeywords(desc.substring(0, 500), keywords);

        async function initOportunidades() {
            const container = document.getElementById('oportunidadesContent');

            try {
                const [properties, stats] = await Promise.all([
                    fetchProperties(),
                    fetchMarketStats()
                ]);

                if (properties.length === 0) {
                    container.innerHTML = '<div class="error-message">Error cargando datos</div>';
                    return;
                }

                // Create neighborhood median map
                const neighborhoodMedians = {};
                stats.forEach(s => {
                    if (s.neighborhood && s.median_price_per_sqm) {
                        neighborhoodMedians[s.neighborhood] = s.median_price_per_sqm;
                    }
                });

                // Find opportunities
                const opportunities = [];

                properties.forEach(p => {
                    if (!p.neighborhood || !p.total_area || Number(p.total_area) === 0) return;

                    const pricePerM2 = Number(p.price) / Number(p.total_area);
                    const neighborhoodMedian = neighborhoodMedians[p.neighborhood];

                    // Price opportunity: 20% below median
                    if (neighborhoodMedian && pricePerM2 < neighborhoodMedian * 0.8) {
                        const gap = ((neighborhoodMedian - pricePerM2) / neighborhoodMedian * 100).toFixed(1);
                        opportunities.push({
                            type: 'price',
                            property: p,
                            gap,
                            neighborhoodMedian,
                            pricePerM2,
                            reason: 'Oportunidad por precio'
                        });
                    }

                    // Refurbish opportunity
                    const keywords = extractKeywords(p.title || '');
                    if (keywords.some(k => ['reciclada', 'refaccionar', 'a reciclar'].includes(k))) {
                        opportunities.push({
                            type: 'refurbish',
                            property: p,
                            pricePerM2,
                            neighborhoodMedian,
                            reason: 'Oportunidad de refacción'
                        });
                    }

                    // Land opportunity
                    if (keywords.includes('lote propio')) {
                        opportunities.push({
                            type: 'land',
                            property: p,
                            pricePerM2,
                            reason: 'Lote propio'
                        });
                    }
                });

                // Sort by gap
                opportunities.sort((a, b) => (b.gap || 0) - (a.gap || 0));

                if (opportunities.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💡</div><div>No se encontraron oportunidades en este momento</div></div>';
                    return;
                }

                const html = opportunities.map(opp => {

                    const badgeText = opp.type === 'refurbish' ? 'Refacción' : opp.type === 'land' ? 'Lote Propio' : 'Precio';

                    return `
                        <div class="opportunity-card">
                            <div class="opportunity-badge ${badgeClass}">${badgeText}</div>
                            <div class="opportunity-title">${opp.property.title || 'Sin título'}</div>
                            <div class="opportunity-details">

                                    <div class="detail-label">Barrio</div>
                                    <div class="detail-value">${opp.property.neighborhood}</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">Precio</div>
                                    <div class="detail-value">${formatPrice(opp.property.price)}</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">USD/m²</div>
                                    <div class="detail-value">$${Math.round(opp.pricePerM2).toLocaleString('es-AR')}</div>
                                </div>
                                ${opp.neighborhoodMedian ? `
                                    <div class="detail-item">
                                        <div class="detail-label">Mediana Barrio</div>
                                        <div class="detail-value">$${Math.round(opp.neighborhoodMedian).toLocaleString('es-AR')}</div>
                                    </div>
                                    <div class="detail-item">
                                        <div class="detail-label">Descuento</div>
                                        <div class="detail-value discount-badge">${opp.gap}%</div>
                                    </div>
                                ` : ''}
                                <div class="detail-item">
                                    <div class="detail-label">Superficie</div>
                                    <div class="detail-value">${Math.round(opp.property.covered_area)} m²</div>

                    fetchRailways(mapaInstance);

        function fetchRailways(map) {
            const cached = sessionStorage.getItem('railways_cache');
            
            if (cached) {
                drawRailways(JSON.parse(cached), map);
                return;
            }

            // Overpass API query for railways around CABA
            const query = `[bbox:-34.75,-58.65,-34.50,-58.30];(way["railway"~"rail|light_rail|subway"];);out geom;`;
            const url = 'https://overpass-api.de/api/interpreter?data=' + encodeURIComponent(query);

            fetch(url)
                .then(r => r.json())
                .then(data => {
                    sessionStorage.setItem('railways_cache', JSON.stringify(data));
                    drawRailways(data, map);
                })
                .catch(e => console.log('Overpass API unavailable:', e));
        }

        function drawRailways(data, map) {
            // Draw railway lines
            if (data.elements) {
                data.elements.forEach(el => {
                    if (el.geometry) {
                        const latlngs = el.geometry.map(g => [g.lat, g.lon]);
                        if (latlngs.length > 1) {
                            L.polyline(latlngs, {
                                color: '#ef4444',
                                weight: 2,
                                opacity: 0.7,
                                dashArray: '5, 5'
                            }).addTo(railwaysLayerGroup);

                            // Add 300m exclusion buffer circles at intervals
                            for (let i = 0; i < latlngs.length; i += 2) {
                                L.circleMarker(latlngs[i], {
                                    radius: 300 / 111, // approximate meters to lat/lng
                                    fillColor: '#ef4444',
                                    color: '#ef4444',
                                    weight: 1,
                                    opacity: 0.2,
                                    fillOpacity: 0.1
                                }).addTo(buffersLayerGroup);
                            }
                        }
                    }
                });
            }
        }

        function calculateROI() {
            const priceRange = document.getElementById('priceRange').value;
            const purchasePrice = parseFloat(document.getElementById('purchasePrice').value) || 0;
            const area = parseFloat(document.getElementById('propertyArea').value) || 0;
            const safetyFactor = parseFloat(document.getElementById('safetySlider').value) / 100;
            const splitRatio = parseFloat(document.getElementById('splitSlider').value) / 100;

            if (!purchasePrice || !area) {
                alert('Por favor complete todos los campos');
                return;
            }

            const gapData = RENOVATION_GAP_DATA[priceRange];
            const avgGap = (gapData.refac + gapData.recic) / 2;
            const renovationCostTotal = avgGap * area;
            const safetyMargin = renovationCostTotal * safetyFactor;
            const usableBudget = renovationCostTotal + safetyMargin;
            const materiaPrima = usableBudget * splitRatio;
            const manoObra = usableBudget * (1 - splitRatio);
            const maxRenoPerM2 = usableBudget / area;

            const postRenoValue = purchasePrice + usableBudget;
            const postRenoPerM2 = postRenoValue / area;
            const currentPerM2 = purchasePrice / area;
            const roi = ((postRenoValue - purchasePrice) / purchasePrice * 100).toFixed(1);

            let viability = 'GO';
            let viabilityClass = 'viability-go';
            if (roi < 20) {
                viability = 'STOP';
                viabilityClass = 'viability-stop';
            } else if (roi < 50) {
                viability = 'CAUTION';
                viabilityClass = 'viability-caution';
            }

            const html = `
                <div class="calc-results">
                    <div class="result-item">
                        <div class="result-label">Valor Post-Renovación</div>
                        <div class="result-value">$${Math.round(postRenoValue).toLocaleString('es-AR')}</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">USD/m² Post-Reno</div>
                        <div class="result-value">$${Math.round(postRenoPerM2).toLocaleString('es-AR')}</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">Gap Bruto</div>
                        <div class="result-value">$${Math.round(renovationCostTotal).toLocaleString('es-AR')}</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">Margen de Seguridad</div>
                        <div class="result-value">$${Math.round(safetyMargin).toLocaleString('es-AR')}</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">Presupuesto Usable</div>
                        <div class="result-value">$${Math.round(usableBudget).toLocaleString('es-AR')}</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">Materia Prima</div>
                        <div class="result-value">$${Math.round(materiaPrima).toLocaleString('es-AR')}</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">Mano de Obra</div>
                        <div class="result-value">$${Math.round(manoObra).toLocaleString('es-AR')}</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">Máx Reno USD/m²</div>
                        <div class="result-value">$${Math.round(maxRenoPerM2).toLocaleString('es-AR')}</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">ROI %</div>
                        <div class="result-value" style="color: #10b981;">${roi}%</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">Viabilidad</div>
                        <span class="viability-badge ${viabilityClass}">${viability}</span>
                    </div>
                </div>
            `;

            document.getElementById('calcResults').innerHTML = html;
        }

        function renderRenovacionTable(renovationData) {
            const tbody = document.getElementById('renovacionTableBody');
            tbody.innerHTML = renovationData.map(r => {
                const roiColor = r.roi_pct > 50 ? '#10b981' : r.roi_pct > 20 ? '#f59e0b' : '#ef4444';
                const keywords = extractKeywords(r.title || '');

                return `
                    <tr>
                        <td class="neighborhood-cell">${r.neighborhood || 'N/A'}</td>
                        <td><a href="${r.permalink}" target="_blank" class="title-cell">Ver →</a></td>
                        <td class="price-cell">${formatPrice(r.price)}</td>
                        <td>${r.area ? Math.round(r.area).toLocaleString('es-AR') : 'N/A'} m²</td>
                        <td class="price-cell">$${Math.round(r.price_per_m2).toLocaleString('es-AR')}</td>
                        <td class="price-cell">$${Math.round(r.post_reno_price_per_m2).toLocaleString('es-AR')}</td>
                        <td style="color: ${roiColor}; font-weight: 600;">${r.roi_pct.toFixed(1)}%</td>
                        <td>${formatPrice(r.budget_reno)}</td>
                        <td>
                            <div class="tags-cell">
                                ${keywords.map(k => `<span class="tag special">${k}</span>`).join('')}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function sortRenovacion(column) {
            console.log('Sort by:', column);
        }

        // ============================================
        // INITIAL LOAD
        // ============================================
        window.addEventListener('DOMContentLoaded', () => {
            initPanorama();
        });
    </script>
</body>
</html>
