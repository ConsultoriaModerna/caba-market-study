<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InmoFindr — 3D Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/auth.js"></script>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/deck.gl@9.1.4/dist.min.js"></script>
    <style>
        :root {
            --bg: #0a0e1a; --panel: #111827; --border: #1e293b;
            --text: #e2e8f0; --dim: #64748b; --accent: #06b6d4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        #map { position: absolute; inset: 0; }

        /* HUD overlay */
        .hud { position: fixed; z-index: 100; pointer-events: none; }
        .hud > * { pointer-events: auto; }

        .hud-top {
            top: 16px; left: 16px; right: 16px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .hud-title {
            background: rgba(17,24,39,0.85); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 12px;
            padding: 12px 20px; display: flex; align-items: center; gap: 12px;
        }
        .hud-title h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
        .hud-title .badge { background: var(--accent); color: #000; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }

        .hud-stats {
            background: rgba(17,24,39,0.85); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 12px;
            padding: 10px 16px; display: flex; gap: 20px; font-size: 12px;
        }
        .hud-stat-val { font-weight: 700; color: var(--accent); }

        /* Filter sidebar */
        .hud-filters {
            top: 70px; left: 16px; width: 220px;
        }
        .filter-panel {
            background: rgba(17,24,39,0.92); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 12px; padding: 14px;
            max-height: calc(100vh - 140px); overflow-y: auto;
        }
        .filter-panel::-webkit-scrollbar { width: 4px; }
        .filter-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .f-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin-bottom: 8px; }
        .f-section { margin-bottom: 12px; }
        .f-label { font-size: 10px; color: var(--dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .f-row { display: flex; gap: 6px; align-items: center; }
        .f-input {
            background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: var(--text);
            padding: 5px 8px; border-radius: 6px; font-size: 11px; font-family: inherit;
            width: 100%;
        }
        .f-input:focus { border-color: var(--accent); outline: none; }
        .f-chip {
            display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: 10px;
            border: 1px solid var(--border); color: var(--dim); cursor: pointer;
            transition: all 0.15s; margin: 2px;
        }
        .f-chip:hover { border-color: var(--accent); color: var(--accent); }
        .f-chip.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
        .f-chip.preset { border-color: #fbbf24; color: #fbbf24; }
        .f-chip.preset:hover { background: rgba(251,191,36,0.15); }
        .f-apply {
            width: 100%; padding: 7px; background: var(--accent); color: #000; border: none;
            border-radius: 6px; font-weight: 700; font-size: 11px; cursor: pointer;
            font-family: inherit; margin-top: 4px;
        }
        .f-reset {
            width: 100%; padding: 5px; background: transparent; color: var(--dim);
            border: 1px solid var(--border); border-radius: 6px; font-size: 10px;
            cursor: pointer; font-family: inherit; margin-top: 4px;
        }

        /* Controls panel */
        .hud-controls {
            top: 70px; right: 16px; width: 260px;
        }
        .ctrl-panel {
            background: rgba(17,24,39,0.9); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 12px; padding: 14px;
        }
        .ctrl-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin-bottom: 10px; }
        .ctrl-row { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; font-size: 12px; }
        .ctrl-row label { color: var(--dim); font-size: 11px; min-width: 50px; }
        .ctrl-btn {
            background: transparent; border: 1px solid var(--border); color: var(--text);
            padding: 5px 10px; border-radius: 8px; font-size: 10px; cursor: pointer;
            font-family: inherit; transition: all 0.15s; white-space: nowrap;
        }
        .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
        .ctrl-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
        .ctrl-toggle { display: flex; gap: 4px; flex-shrink: 0; }
        input[type="range"] {
            -webkit-appearance: none; width: 100%; height: 4px;
            background: var(--border); border-radius: 2px; outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            border-radius: 50%; background: var(--accent); cursor: pointer;
        }

        /* Flyover button */
        .fly-btn {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            z-index: 100; background: linear-gradient(135deg, #06b6d4, #8b5cf6);
            color: #fff; border: none; padding: 12px 28px; border-radius: 30px;
            font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
            box-shadow: 0 4px 24px rgba(6,182,212,0.4); transition: all 0.2s;
            letter-spacing: 0.3px;
        }
        .fly-btn:hover { transform: translateX(-50%) scale(1.05); box-shadow: 0 6px 32px rgba(6,182,212,0.6); }
        .fly-btn.flying { background: linear-gradient(135deg, #ef4444, #f97316); }

        /* Legend */
        .hud-legend {
            bottom: 24px; left: 16px;
        }
        .legend-bar {
            background: rgba(17,24,39,0.85); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px;
        }
        .legend-gradient {
            width: 180px; height: 10px; border-radius: 4px;
            background: linear-gradient(to right, #10b981, #fbbf24, #ef4444);
            margin-bottom: 4px;
        }
        .legend-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--dim); width: 180px; }

        /* Tooltip */
        .deck-tooltip {
            background: rgba(17,24,39,0.95) !important; backdrop-filter: blur(12px);
            border: 1px solid var(--border) !important; border-radius: 10px !important;
            padding: 12px 16px !important; font-family: 'Inter', sans-serif !important;
            font-size: 12px !important; color: var(--text) !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important; max-width: 280px !important;
        }

        /* Back to 2D link */
        .back-link {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            z-index: 200; color: var(--dim); font-size: 11px; text-decoration: none;
            background: rgba(17,24,39,0.7); padding: 4px 12px; border-radius: 20px;
            border: 1px solid var(--border); transition: all 0.15s;
        }
        .back-link:hover { color: var(--accent); border-color: var(--accent); }
    </style>
</head>
<body>
<div id="map"></div>

<nav style="position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:200;display:flex;gap:4px;background:rgba(17,24,39,0.8);backdrop-filter:blur(12px);padding:4px 8px;border-radius:20px;border:1px solid var(--border);">
    <a href="index.html" class="back-link" style="position:static;transform:none;background:none;border:none;padding:2px 10px;">Dashboard</a>
    <a href="mapa.html" class="back-link" style="position:static;transform:none;background:none;border:none;padding:2px 10px;">Mapa 2D</a>
    <a href="wave.html" class="back-link" style="position:static;transform:none;background:none;border:none;padding:2px 10px;">Wave</a>
    <a href="d3-analytics.html" class="back-link" style="position:static;transform:none;background:none;border:none;padding:2px 10px;">D3</a>
</nav>

<div class="hud hud-top">
    <div class="hud-title">
        <h1>InmoFindr 3D</h1>
        <span class="badge">BETA</span>
        <span class="badge" style="background:#06b6d4;font-size:9px;">CASAS</span>
    </div>
    <div class="hud-stats" id="stats">
        <span>Cargando...</span>
    </div>
</div>

<!-- Filter sidebar (left) -->
<div class="hud hud-filters">
    <div class="filter-panel">
        <div class="f-title">Filtros</div>
        <div class="f-section">
            <div class="f-label">Precio USD</div>
            <div class="f-row">
                <input type="number" class="f-input" id="f-price-min" placeholder="Min" value="50000" step="10000">
                <span style="color:var(--dim);font-size:10px;">—</span>
                <input type="number" class="f-input" id="f-price-max" placeholder="Max" value="210000" step="10000">
            </div>
            <div style="margin-top:4px;">
                <span class="f-chip preset" onclick="setPreset(50000,210000)">Todo ≤210k</span>
                <span class="f-chip preset" onclick="setPreset(100000,150000)">100-150k</span>
                <span class="f-chip preset" onclick="setPreset(150000,180000)">150-180k</span>
            </div>
        </div>
        <div class="f-section">
            <div class="f-label">USD/m² max</div>
            <div class="f-row">
                <input type="number" class="f-input" id="f-usdm2-max" placeholder="Ej: 1200" step="50">
            </div>
        </div>
        <div class="f-section">
            <div class="f-label">Superficie min m²</div>
            <div class="f-row">
                <input type="number" class="f-input" id="f-area-min" placeholder="Ej: 120" step="10">
            </div>
        </div>
        <div class="f-section">
            <div class="f-label">Ambientes min</div>
            <div class="f-row">
                <input type="number" class="f-input" id="f-amb-min" placeholder="Ej: 3" min="0" max="20">
            </div>
        </div>
        <div class="f-section">
            <div class="f-label">Segmento</div>
            <div>
                <span class="f-chip active" data-seg="all" onclick="toggleSeg(this)">Todos</span>
                <span class="f-chip" data-seg="refac" onclick="toggleSeg(this)">Refac</span>
                <span class="f-chip" data-seg="recic" onclick="toggleSeg(this)">Recic</span>
            </div>
        </div>
        <div class="f-section">
            <div class="f-label">Fuente</div>
            <div id="src-chips"></div>
        </div>
        <button class="f-apply" onclick="applyFilters()">Aplicar Filtros</button>
        <button class="f-reset" onclick="resetFilters()">Limpiar</button>
    </div>
</div>

<!-- Visualization controls (right) -->
<div class="hud hud-controls">
    <div class="ctrl-panel">
        <div class="ctrl-title">Visualizacion</div>
        <div class="ctrl-row">
            <label>Modo</label>
            <div class="ctrl-toggle">
                <button class="ctrl-btn active" id="mode-scatter" onclick="setMode('scatter')">Pts</button>
                <button class="ctrl-btn" id="mode-hex" onclick="setMode('hex')">Hex</button>
                <button class="ctrl-btn" id="mode-column" onclick="setMode('column')">Col</button>
            </div>
        </div>
        <div class="ctrl-row">
            <label>Altura</label>
            <input type="range" id="elevation-scale" min="0" max="100" value="15" oninput="updateElevation(this.value)">
        </div>
        <div class="ctrl-row">
            <label>Radio hex</label>
            <input type="range" id="hex-radius" min="50" max="500" value="150" oninput="updateHexRadius(this.value)">
        </div>
    </div>
</div>

<button class="fly-btn" id="flyBtn" onclick="toggleFlyover()">Sobrevolar Buenos Aires</button>

<div class="hud hud-legend">
    <div class="legend-bar">
        <div style="font-size:10px;color:var(--dim);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">USD/m²</div>
        <div class="legend-gradient"></div>
        <div class="legend-labels"><span>$600</span><span>$1,200</span><span>$1,800+</span></div>
    </div>
</div>

<script>
const SB_URL = 'https://ysynltkotzizayjtoujf.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzeW5sdGtvdHppemF5anRvdWpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MzM1MjksImV4cCI6MjA4MTIwOTUyOX0.-rSFZIILSIwPWIRW-frMm27_wRsIOK79Txz5alE6QUE';

// State
let allData = [];
let filteredData = [];
let currentMode = 'scatter';
let currentSeg = 'all';
let activeSources = new Set();
let elevationScale = 15;
let hexRadius = 150;
let deckgl, mapInstance;

// Color scale: green -> yellow -> red
function priceToColor(v) {
    const lo = 600, mid = 1200, hi = 1800;
    if (!v || v <= lo) return [16, 185, 129, 200];
    if (v <= mid) {
        const t = (v - lo) / (mid - lo);
        return [Math.round(16 + t * 235), Math.round(185 + t * 6), Math.round(129 - t * 93), 200];
    }
    if (v <= hi) {
        const t = (v - mid) / (hi - mid);
        return [Math.round(251 - t * 12), Math.round(191 - t * 123), Math.round(36 + t * 32), 200];
    }
    return [239, 68, 68, 200];
}

function fmt(n) { return n ? Number(n).toLocaleString('es-AR') : '-'; }
function isNewProp(p) { return window.inmofindrIsNewProp ? window.inmofindrIsNewProp(p) : (p.first_seen_at && (Date.now() - new Date(p.first_seen_at).getTime()) < 3 * 86400000); }
// Animated glow for new properties via time-varying color
let glowPhase = 0;
setInterval(() => { glowPhase = (glowPhase + 0.05) % (Math.PI * 2); }, 50);

// Fetch properties from Supabase (paginated, same as 2D map)
async function fetchData() {
    const fields = 'id,title,price,price_per_sqm,total_area,covered_area,ambientes,neighborhood,address_text,latitude,longitude,permalink,keywords,segment,source,livability_score,livability_detail,first_seen_at,property_type';
    const base = `${SB_URL}/rest/v1/properties?select=${fields}&is_active=eq.true&canonical_id=is.null&latitude=not.is.null&order=price_per_sqm.asc`;
    const headers = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` };
    let all = [];
    for (let offset = 0; offset < 20000; offset += 1000) {
        try {
            const resp = await fetch(base + `&limit=1000&offset=${offset}`, { headers });
            if (!resp.ok) { console.error('Fetch error:', resp.status); break; }
            const batch = await resp.json();
            if (!Array.isArray(batch) || !batch.length) break;
            all = all.concat(batch);
            document.getElementById('stats').innerHTML = `<span>Cargando... <span class="hud-stat-val">${all.length}</span> casas</span>`;
        } catch (e) { console.error('Fetch error:', e); break; }
    }
    return all.map(p => ({
        ...p,
        price: Number(p.price) || 0,
        price_per_sqm: Number(p.price_per_sqm) || 0,
        total_area: Number(p.total_area) || 0,
        covered_area: Number(p.covered_area) || 0,
        ambientes: Number(p.ambientes) || 0,
        latitude: Number(p.latitude),
        longitude: Number(p.longitude),
        position: [Number(p.longitude), Number(p.latitude)]
    }));
}

// Build layers based on current mode
function buildLayers() {
    const data = filteredData;
    if (!data.length) return [];

    if (currentMode === 'scatter') {
        const newProps = data.filter(isNewProp);
        const oldProps = data.filter(d => !isNewProp(d));
        const layers = [
            new deck.ScatterplotLayer({
                id: 'scatter',
                data: oldProps,
                getPosition: d => d.position,
                getRadius: d => Math.max(8, Math.sqrt(d.total_area || 50) * 2),
                getFillColor: d => priceToColor(d.price_per_sqm),
                getLineColor: [255, 255, 255, 120],
                lineWidthMinPixels: 1,
                radiusMinPixels: 4,
                radiusMaxPixels: 30,
                getElevation: d => (d.price_per_sqm || 0) * elevationScale * 0.05,
                extruded: true,
                pickable: true,
                opacity: 0.85,
                transitions: { getElevation: 600, getRadius: 400 }
            })
        ];
        if (newProps.length) {
            layers.push(new deck.ScatterplotLayer({
                id: 'scatter-new',
                data: newProps,
                getPosition: d => d.position,
                getRadius: 20,
                getFillColor: [74, 222, 128, 220],
                getLineColor: [255, 255, 255, 255],
                lineWidthMinPixels: 2,
                radiusMinPixels: 8,
                radiusMaxPixels: 40,
                getElevation: d => (d.price_per_sqm || 0) * elevationScale * 0.05,
                extruded: true,
                pickable: true,
                opacity: 0.95
            }));
        }
        return layers;
    }

    if (currentMode === 'hex') {
        return [
            new deck.HexagonLayer({
                id: 'hex',
                data,
                getPosition: d => d.position,
                getElevationWeight: d => d.price_per_sqm || 0,
                getColorWeight: d => d.price_per_sqm || 0,
                elevationAggregation: 'MEAN',
                colorAggregation: 'MEAN',
                radius: hexRadius,
                elevationScale: elevationScale * 0.3,
                extruded: true,
                pickable: true,
                opacity: 0.8,
                coverage: 0.88,
                colorRange: [
                    [16, 185, 129], [74, 222, 128], [251, 191, 36],
                    [249, 115, 22], [239, 68, 68], [185, 28, 28]
                ],
                transitions: { elevationScale: 600 }
            })
        ];
    }

    if (currentMode === 'column') {
        return [
            new deck.ColumnLayer({
                id: 'column',
                data,
                getPosition: d => d.position,
                getElevation: d => (d.price_per_sqm || 0) * elevationScale * 0.04,
                getFillColor: d => isNewProp(d) ? [74, 222, 128, 240] : priceToColor(d.price_per_sqm),
                getLineColor: d => isNewProp(d) ? [255, 255, 255, 200] : [0, 0, 0, 0],
                lineWidthMinPixels: 1,
                diskResolution: 8,
                radius: 25,
                extruded: true,
                pickable: true,
                opacity: 0.8,
                transitions: { getElevation: 600 }
            })
        ];
    }
    return [];
}

function getTooltip({ object }) {
    if (!object) return null;

    // Hexbin aggregate
    if (object.points) {
        const pts = object.points;
        const avg = Math.round(pts.reduce((s, p) => s + (p.source.price_per_sqm || 0), 0) / pts.length);
        const avgPrice = Math.round(pts.reduce((s, p) => s + (p.source.price || 0), 0) / pts.length);
        return {
            html: `<div style="font-weight:700;font-size:14px;margin-bottom:6px;">${pts.length} casas</div>
                   <div>USD/m² promedio: <b style="color:#06b6d4;">$${fmt(avg)}</b></div>
                   <div>Precio promedio: <b>$${fmt(avgPrice)}</b></div>`,
            style: {}
        };
    }

    // Individual property
    const p = object;
    const title = p.title || p.neighborhood || 'Propiedad';
    const location = p.address_text || p.neighborhood || '';
    const newBadge = isNewProp(p) ? '<span style="background:rgba(74,222,128,0.25);color:#4ade80;padding:1px 6px;border-radius:6px;font-size:9px;font-weight:700;margin-left:6px;">NEW</span>' : '';
    const segLabel = p.segment === 'refac' ? '<span style="color:#fb923c;">A refaccionar</span>' :
                     p.segment === 'recic' ? '<span style="color:#4ade80;">Reciclada</span>' : '';
    return {
        html: `<div style="font-weight:700;font-size:13px;margin-bottom:4px;line-height:1.3;">${title}${newBadge}</div>
               ${location ? '<div style="color:#94a3b8;font-size:11px;margin-bottom:8px;">' + location + '</div>' : ''}
               <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;font-size:12px;">
                   ${p.price_per_sqm ? '<div>USD/m² <b style="color:#06b6d4;">$' + fmt(p.price_per_sqm) + '</b></div>' : ''}
                   ${p.price ? '<div>Precio <b>$' + fmt(p.price) + '</b></div>' : ''}
                   ${p.total_area ? '<div>Area <b>' + fmt(p.total_area) + ' m²</b></div>' : ''}
                   ${p.ambientes ? '<div>Amb. <b>' + p.ambientes + '</b></div>' : ''}
               </div>
               ${segLabel ? '<div style="margin-top:6px;">' + segLabel + '</div>' : ''}
               ${p.livability_score ? '<div style="margin-top:6px;padding:4px 0;border-top:1px solid rgba(255,255,255,0.08);"><span style="font-size:11px;">Livability <b style="color:' + (p.livability_score >= 60 ? '#4ade80' : p.livability_score >= 40 ? '#eab308' : '#ef4444') + ';">' + p.livability_score + '/100</b></span>' + (p.livability_detail ? '<div style="display:flex;gap:6px;margin-top:3px;flex-wrap:wrap;">' + ['Ruido','Inund.','Segur.','Subte','Transp.'].map(function(label, i) { var keys = ['noise','flood','crime','subte','transport']; var val = (p.livability_detail || {})[keys[i]] || 0; var c = val >= 70 ? '#4ade80' : val >= 40 ? '#eab308' : '#ef4444'; return '<span style="font-size:9px;"><span style="color:#64748b;">' + label + '</span> <b style="color:' + c + ';">' + val + '</b></span>'; }).join('') + '</div>' : '') + '</div>' : ''}`,
        style: {}
    };
}

function updateStats() {
    const d = filteredData;
    const withPrice = d.filter(p => p.price_per_sqm > 0);
    const avg = withPrice.length ? Math.round(withPrice.reduce((s, p) => s + p.price_per_sqm, 0) / withPrice.length) : 0;
    const prices = d.filter(p => p.price > 0).map(p => p.price).sort((a, b) => a - b);
    const median = prices.length ? prices[Math.floor(prices.length / 2)] : 0;
    document.getElementById('stats').innerHTML = `
        <span><span class="hud-stat-val">${d.length.toLocaleString()}</span> casas</span>
        ${avg ? '<span>Med. <span class="hud-stat-val">$' + fmt(avg) + '</span>/m²</span>' : ''}
        ${median ? '<span>Precio med. <span class="hud-stat-val">$' + fmt(median) + '</span></span>' : ''}
    `;
}

function render() {
    if (deckgl) deckgl.setProps({ layers: buildLayers() });
    updateStats();
}

// Filters
function applyFilters() {
    const pMin = Number(document.getElementById('f-price-min').value) || 0;
    const pMax = Number(document.getElementById('f-price-max').value) || Infinity;
    const usdMax = Number(document.getElementById('f-usdm2-max').value) || Infinity;
    const areaMin = Number(document.getElementById('f-area-min').value) || 0;
    const ambMin = Number(document.getElementById('f-amb-min').value) || 0;

    filteredData = allData.filter(p => {
        if (p.price < pMin || p.price > pMax) return false;
        if (usdMax < Infinity && p.price_per_sqm > usdMax) return false;
        if (areaMin && p.total_area < areaMin) return false;
        if (ambMin && p.ambientes < ambMin) return false;
        if (currentSeg !== 'all' && p.segment !== currentSeg) return false;
        if (activeSources.size && !activeSources.has(p.source)) return false;
        return true;
    });
    render();
}

function resetFilters() {
    document.getElementById('f-price-min').value = '';
    document.getElementById('f-price-max').value = '';
    document.getElementById('f-usdm2-max').value = '';
    document.getElementById('f-area-min').value = '';
    document.getElementById('f-amb-min').value = '';
    currentSeg = 'all';
    activeSources.clear();
    document.querySelectorAll('[data-seg]').forEach(c => c.classList.toggle('active', c.dataset.seg === 'all'));
    document.querySelectorAll('[data-src]').forEach(c => c.classList.remove('active'));
    filteredData = allData;
    render();
}

function setPreset(min, max) {
    document.getElementById('f-price-min').value = min;
    document.getElementById('f-price-max').value = max;
    applyFilters();
}

function toggleSeg(el) {
    currentSeg = el.dataset.seg;
    document.querySelectorAll('[data-seg]').forEach(c => c.classList.toggle('active', c.dataset.seg === currentSeg));
    applyFilters();
}

function toggleSrc(el) {
    const src = el.dataset.src;
    if (el.classList.contains('active')) {
        el.classList.remove('active');
        activeSources.delete(src);
    } else {
        el.classList.add('active');
        activeSources.add(src);
    }
    applyFilters();
}

function initSourceChips() {
    const sources = {};
    allData.forEach(p => { if (p.source) sources[p.source] = (sources[p.source] || 0) + 1; });
    const container = document.getElementById('src-chips');
    const labels = { zonaprop: 'ZP', mercadolibre: 'ML', argenprop: 'AP' };
    container.innerHTML = Object.entries(sources)
        .sort((a, b) => b[1] - a[1])
        .map(([src, n]) => `<span class="f-chip" data-src="${src}" onclick="toggleSrc(this)">${labels[src] || src} (${n})</span>`)
        .join('');
}

// Auto-apply filters on input change with debounce
let filterTimer;
function debounceFilter() { clearTimeout(filterTimer); filterTimer = setTimeout(applyFilters, 400); }

// Visualization controls
function setMode(mode) {
    currentMode = mode;
    ['scatter', 'hex', 'column'].forEach(m => {
        document.getElementById('mode-' + m).classList.toggle('active', m === mode);
    });
    render();
}

function updateElevation(val) {
    elevationScale = Number(val);
    render();
}

function updateHexRadius(val) {
    hexRadius = Number(val);
    render();
}

// Cinematic flyover
const FLYOVER_WAYPOINTS = [
    { center: [-58.46, -34.55], zoom: 13.5, pitch: 60, bearing: -30, duration: 0 },
    { center: [-58.44, -34.57], zoom: 14, pitch: 65, bearing: -10, duration: 8000 },
    { center: [-58.42, -34.59], zoom: 14.5, pitch: 60, bearing: 15, duration: 8000 },
    { center: [-58.38, -34.60], zoom: 15, pitch: 70, bearing: 40, duration: 6000 },
    { center: [-58.37, -34.62], zoom: 14.5, pitch: 65, bearing: 60, duration: 6000 },
    { center: [-58.39, -34.63], zoom: 14, pitch: 55, bearing: 90, duration: 6000 },
    { center: [-58.44, -34.61], zoom: 13, pitch: 50, bearing: 120, duration: 8000 },
    { center: [-58.47, -34.57], zoom: 12.5, pitch: 55, bearing: -60, duration: 10000 },
    { center: [-58.43, -34.59], zoom: 13, pitch: 60, bearing: -20, duration: 8000 },
];

let flyoverIndex = 0;
let isFlying = false;

function toggleFlyover() {
    const btn = document.getElementById('flyBtn');
    if (isFlying) {
        isFlying = false;
        btn.textContent = 'Sobrevolar Buenos Aires';
        btn.classList.remove('flying');
        return;
    }
    isFlying = true;
    flyoverIndex = 0;
    btn.textContent = 'Detener sobrevuelo';
    btn.classList.add('flying');
    flyNext();
}

function flyNext() {
    if (!isFlying || flyoverIndex >= FLYOVER_WAYPOINTS.length) {
        isFlying = false;
        document.getElementById('flyBtn').textContent = 'Sobrevolar Buenos Aires';
        document.getElementById('flyBtn').classList.remove('flying');
        return;
    }
    const wp = FLYOVER_WAYPOINTS[flyoverIndex];
    flyoverIndex++;
    mapInstance.flyTo({
        center: wp.center,
        zoom: wp.zoom,
        pitch: wp.pitch,
        bearing: wp.bearing,
        duration: wp.duration,
        essential: true
    });
    setTimeout(flyNext, wp.duration + 500);
}

// On click: open permalink
function onClick(info) {
    if (info.object && info.object.permalink) {
        window.open(info.object.permalink, '_blank');
    }
}

// Initialize
async function init() {
    const data = await fetchData();
    allData = data;
    filteredData = data;
    initSourceChips();

    // Attach debounce to filter inputs
    document.querySelectorAll('.f-input').forEach(el => {
        el.addEventListener('input', debounceFilter);
    });

    mapInstance = new maplibregl.Map({
        container: 'map',
        style: {
            version: 8,
            sources: {
                'carto-dark': {
                    type: 'raster',
                    tiles: ['https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'],
                    tileSize: 256,
                    attribution: '&copy; CARTO, &copy; OpenStreetMap'
                }
            },
            layers: [{
                id: 'carto-dark-layer',
                type: 'raster',
                source: 'carto-dark',
                minzoom: 0,
                maxzoom: 20
            }]
        },
        center: [-58.43, -34.60],
        zoom: 12,
        pitch: 50,
        bearing: -15,
        antialias: true
    });

    mapInstance.addControl(new maplibregl.NavigationControl(), 'bottom-right');

    // Try MapboxOverlay first, fall back to manual sync
    if (deck.MapboxOverlay) {
        deckgl = new deck.MapboxOverlay({
            interleaved: false,
            getTooltip,
            onClick,
            layers: []
        });
        mapInstance.on('load', () => {
            mapInstance.addControl(deckgl);
            render();
            setTimeout(() => {
                mapInstance.flyTo({ center: [-58.43, -34.59], zoom: 13, pitch: 55, bearing: -20, duration: 3000 });
            }, 500);
        });
    } else {
        // Fallback: standalone Deck with manual camera sync
        deckgl = new deck.Deck({
            parent: document.getElementById('map'),
            style: { position: 'absolute', top: 0, left: 0, zIndex: 1, pointerEvents: 'none' },
            initialViewState: {
                longitude: -58.43, latitude: -34.60, zoom: 12, pitch: 50, bearing: -15
            },
            controller: false,
            getTooltip,
            onClick,
            layers: []
        });
        // Sync camera
        const syncDeck = () => {
            const { lng, lat } = mapInstance.getCenter();
            deckgl.setProps({
                viewState: {
                    longitude: lng, latitude: lat,
                    zoom: mapInstance.getZoom(),
                    pitch: mapInstance.getPitch(),
                    bearing: mapInstance.getBearing()
                }
            });
        };
        mapInstance.on('move', syncDeck);
        mapInstance.on('load', () => {
            render();
            setTimeout(() => {
                mapInstance.flyTo({ center: [-58.43, -34.59], zoom: 13, pitch: 55, bearing: -20, duration: 3000 });
            }, 500);
        });
    }
}

init();
</script>
